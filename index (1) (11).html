<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stream BD – FIFA World Cup 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f6f8;--white:#fff;--border:#e0e3e8;--text:#1a1d23;
      --sub:#5c6270;--accent:#1a6e3a;--accent2:#e8f4ed;--r:10px;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    header{
      background:var(--white);border-bottom:1px solid var(--border);
      padding:0 24px;display:flex;align-items:center;
      justify-content:space-between;height:60px;
      position:sticky;top:0;z-index:100;
    }
    .logo{font-size:1.15rem;font-weight:700;color:var(--accent)}
    .logo span{color:var(--text);font-weight:400}
    .badge{font-size:.72rem;background:var(--accent2);color:var(--accent);
      border:1px solid #b5d9c4;padding:3px 10px;border-radius:20px;font-weight:600}

    .page{display:none}.page.active{display:block}

    /* SCHEDULE */
    .sw{max-width:860px;margin:0 auto;padding:28px 16px 60px}
    .sec{font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
      color:var(--sub);margin:28px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .sec:first-child{margin-top:0}
    .dl{font-size:.78rem;font-weight:600;color:var(--sub);padding:6px 0 4px}
    .mc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);
      padding:14px 18px;margin-bottom:8px;cursor:pointer;display:flex;
      align-items:center;gap:14px;transition:box-shadow .15s,border-color .15s}
    .mc:hover{border-color:#a8c8b8;box-shadow:0 3px 10px rgba(26,110,58,.1)}
    .gtag{font-size:.63rem;font-weight:700;background:var(--accent2);color:var(--accent);
      border-radius:4px;padding:2px 6px;white-space:nowrap;min-width:44px;text-align:center}
    .mt{flex:1;font-size:.97rem;font-weight:600}
    .mt .vs{color:var(--sub);font-weight:400;font-size:.82rem;margin:0 5px}
    .mm{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
    .mti{font-size:.82rem;font-weight:600;color:var(--accent);white-space:nowrap}
    .mv{font-size:.7rem;color:var(--sub);white-space:nowrap;max-width:180px;
      overflow:hidden;text-overflow:ellipsis;text-align:right}
    .pi{color:#ccd0d8;font-size:1rem;transition:color .15s}
    .mc:hover .pi{color:var(--accent)}

    /* STREAM PAGE */
    #sp{display:none;flex-direction:column;height:calc(100vh - 60px)}
    #sp.active{display:flex}
    .sl{display:flex;flex:1;overflow:hidden}

    /* PLAYER — left 1/3 */
    .pp{width:33.333%;min-width:300px;background:#0d0f12;display:flex;
      flex-direction:column;position:sticky;top:60px;height:calc(100vh - 60px);overflow:hidden}
    .pt{padding:14px 16px 10px;background:#161a20;border-bottom:1px solid #252930}
    .bb{background:none;border:none;color:#8a9bb0;font-size:.82rem;cursor:pointer;
      padding:0;display:flex;align-items:center;gap:5px;margin-bottom:10px;font-family:inherit}
    .bb:hover{color:#fff}
    .stitle{font-size:1rem;font-weight:700;color:#fff;line-height:1.3}
    .ssub{font-size:.72rem;color:#7a8898;margin-top:3px}

    /* VIDEO CONTAINER */
    .vbox{flex:1;background:#080a0d;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
    #player{width:100%;height:100%;display:block;background:#000}
    #iframePlayer{width:100%;height:100%;border:none;display:none;background:#000}
    .voverlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;
      flex-direction:column;align-items:center;justify-content:center;
      color:#fff;gap:10px;pointer-events:none}
    .voverlay.hidden{display:none}
    .voverlay .spin{
      width:36px;height:36px;border:3px solid #333;
      border-top-color:var(--accent);border-radius:50%;
      animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .voverlay .vmsg{font-size:.82rem;color:#8899aa}

    /* SOURCE BUTTONS */
    .ss{padding:10px 14px;background:#161a20;border-top:1px solid #252930;overflow-y:auto;max-height:38vh}
    .sl2{font-size:.6rem;letter-spacing:.8px;text-transform:uppercase;color:#556070;margin-bottom:6px}
    .sg{margin-bottom:8px}
    .sgl{font-size:.58rem;letter-spacing:.7px;text-transform:uppercase;color:#3d4a58;margin-bottom:4px}
    .sbr{display:flex;flex-wrap:wrap;gap:5px}
    .sb{font-size:.71rem;font-weight:600;padding:5px 10px;border-radius:6px;
      border:1px solid #2e3540;background:#1e232c;color:#8eacc4;
      cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
    .sb:hover,.sb.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .sb.err{background:#2a1515;border-color:#4a2020;color:#aa6666}

    .sn{background:#111418;padding:7px 14px;font-size:.66rem;color:#485560;
      text-align:center;border-top:1px solid #1e2530;line-height:1.6;flex-shrink:0}

    /* SIDEBAR */
    .sm{flex:1;overflow-y:auto;padding:20px 20px 40px;background:var(--bg)}
    .stl{font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
      color:var(--sub);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
    .sc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);
      padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
    .sc:hover{border-color:#a8c8b8;box-shadow:0 2px 8px rgba(26,110,58,.08)}
    .sc.cur{border-color:var(--accent);background:var(--accent2)}
    .ste{font-size:.88rem;font-weight:600;margin-bottom:3px}
    .si{font-size:.7rem;color:var(--sub);display:flex;gap:8px;flex-wrap:wrap}

    @media(max-width:680px){
      .pp{width:100%;min-width:unset;position:relative;height:auto}
      .vbox{height:56vw}
      .sl{flex-direction:column}
      .sm{padding:14px 12px 40px}
      .mv{display:none}
      header{padding:0 14px}
      .sw{padding:16px 10px 40px}
    }
  </style>
</head>

      <div class="stl">অন্যান্য ম্যাচ</div>

// ─── HLS PLAYER ──────────────────────────────────────────────────────────────
let hls = null;
let activeBtn = null;

function loadStream(src, btn) {
  const video = document.getElementById("player");
  const iframe = document.getElementById("iframePlayer");
  const overlay = document.getElementById("overlay");
  const vmsg = document.getElementById("vmsg");

  // newTab type → নতুন ট্যাবে খুলবে, player অপরিবর্তিত থাকবে
  if (src.type === "newTab") {
    document.querySelectorAll(".sb").forEach(b => b.classList.remove("active"));
    if (btn) btn.classList.add("active");
    window.open(src.url, "_blank");
    return;
  }

  // Mark button active
  document.querySelectorAll(".sb").forEach(b => b.classList.remove("active"));
  if (btn) { btn.classList.add("active"); activeBtn = btn; }

  overlay.classList.remove("hidden");
  vmsg.textContent = "লোড হচ্ছে…";

  // Destroy previous HLS
  if (hls) { hls.destroy(); hls = null; }

  const isIframe = src.type === "iframe";
  const embedUrl = src.embed || src.url;
  const hlsUrl = src.url;

  if (isIframe) {
    video.style.display = "none";
    video.pause();
    video.src = "";
    iframe.style.display = "block";
    iframe.src = embedUrl;
    setTimeout(() => overlay.classList.add("hidden"), 2000);
  } else {
    iframe.style.display = "none";
    iframe.src = "";
    video.style.display = "block";

    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true, lowLatencyMode: true, xhrSetup: xhr => { xhr.withCredentials = false; } });
      hls.loadSource(hlsUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => { overlay.classList.add("hidden"); video.play().catch(() => {}); });
      hls.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) { vmsg.textContent = "সোর্স লোড হয়নি। অন্যটি চেষ্টা করুন।"; overlay.classList.remove("hidden"); if (btn) btn.classList.add("err"); }
      });
    } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
      video.src = hlsUrl;
      video.addEventListener("loadedmetadata", () => { overlay.classList.add("hidden"); video.play().catch(() => {}); });
      video.addEventListener("error", () => { vmsg.textContent = "সোর্স লোড হয়নি। অন্যটি চেষ্টা করুন।"; });
    } else {
      vmsg.textContent = "আপনার ব্রাউজার HLS সাপোর্ট করে না।";
    }
  }
}

// ─── BUILD SCHEDULE ───────────────────────────────────────────────────────────
function gLabel(g) {
  return GS.includes(g) ? "Group "+g : (KL[g]||g);
}

function buildSchedule() {
  const c = document.getElementById("sc2");
  c.innerHTML = "";

  function addSec(text) {
    const d = document.createElement("div");
    d.className = "sec"; d.textContent = text; c.appendChild(d);
  }
  function addDL(text) {
    const d = document.createElement("div");
    d.className = "dl"; d.textContent = text; c.appendChild(d);
  }
  function addCard(m) {
    const hFlag = addFlag(m.h);
    const aFlag = addFlag(m.a);
    const d = document.createElement("div");
    d.className = "mc";
    d.onclick = () => openMatch(m.id);
    d.innerHTML = `<div class="gtag">${gLabel(m.g)}</div>
      <div class="mt">${hFlag}<span class="vs"> vs </span>${aFlag}</div>
      <div class="mm"><div class="mti">${m.t}</div><div class="mv">${m.v}</div></div>
      <div class="pi">▶</div>`;
    c.appendChild(d);
  }

  addSec("GROUP STAGE — ১১ জুন – ২৭ জুন");
  const bd = {};
  M.filter(m=>GS.includes(m.g)).forEach(m=>(bd[m.d]=bd[m.d]||[]).push(m));
  Object.entries(bd).forEach(([d,ms])=>{ addDL(d); ms.forEach(addCard); });

  KO.forEach(stage=>{
    const ms = M.filter(m=>m.g===stage);
    if(!ms.length) return;
    addSec(KL[stage]||stage);
    const bd2={};
    ms.forEach(m=>(bd2[m.d]=bd2[m.d]||[]).push(m));
    Object.entries(bd2).forEach(([d,ms2])=>{ addDL(d); ms2.forEach(addCard); });
  });
}

// ─── OPEN MATCH ───────────────────────────────────────────────────────────────
function openMatch(id) {
  const m = M.find(x=>x.id===id);
  if(!m) return;

  document.getElementById("stitle").textContent = addFlag(m.h)+" vs "+addFlag(m.a);
  document.getElementById("ssub").textContent = m.d+" · "+m.t+" · "+m.v;

  buildSourceBtns(m);
  buildSidebar(id);

  // Auto-load first source
  const firstSrc = SOURCES[0].items[0];
  setTimeout(() => {
    const firstBtn = document.querySelector(".sb");
    loadStream(firstSrc, firstBtn);
  }, 50);

  document.getElementById("schp").classList.remove("active");
  document.getElementById("schp").style.display = "none";
  const sp = document.getElementById("sp");
  sp.style.display = "flex";
  sp.classList.add("active");
  window.scrollTo(0,0);
}

let curMatch = null; // currently selected match

function buildSourceBtns(m) {
  if (m) curMatch = m;
  const c = document.getElementById("sgc");
  c.innerHTML = "";
  SOURCES.forEach(grp => {
    const gd = document.createElement("div"); gd.className = "sg";
    const gl = document.createElement("div"); gl.className = "sgl"; gl.textContent = grp.group;
    gd.appendChild(gl);
    const row = document.createElement("div"); row.className = "sbr";
    grp.items.forEach(src => {
      const b = document.createElement("button");
      b.className = "sb";
      const isExt = src.type === "newTab";
      b.textContent = src.label + (isExt ? " ↗" : "");
      b.title = isExt ? "নতুন ট্যাবে খুলবে" : "";
      b.onclick = () => {
        b.classList.remove("err");
        if (src.type === "newTab") {
          const h = curMatch ? curMatch.h : "";
          const a = curMatch ? curMatch.a : "";
          window.open(src.urlFn(h, a), "_blank");
          // বাটন briefly highlight করো
          b.classList.add("active");
          setTimeout(() => b.classList.remove("active"), 800);
        } else {
          loadStream(src, b);
        }
      };
      row.appendChild(b);
    });
    gd.appendChild(row);
    c.appendChild(gd);
  });
}

function buildSidebar(curId) {
  const list = document.getElementById("sbl");
  list.innerHTML = "";
  M.forEach(m=>{
    const d = document.createElement("div");
    d.className = "sc"+(m.id===curId?" cur":"");
    d.onclick = () => {
      document.querySelectorAll(".sc").forEach(c=>c.classList.remove("cur"));
      d.classList.add("cur");
      document.getElementById("stitle").textContent = addFlag(m.h)+" vs "+addFlag(m.a);
      document.getElementById("ssub").textContent = m.d+" · "+m.t+" · "+m.v;
      buildSourceBtns(m);
      const firstSrc = SOURCES[0].items[0];
      setTimeout(() => {
        const firstBtn = document.querySelector(".sb");
        loadStream(firstSrc, firstBtn);
      }, 50);
    };
    d.innerHTML = `<div class="ste">${addFlag(m.h)} vs ${addFlag(m.a)}</div>
      <div class="si"><span>${gLabel(m.g)}</span><span>${m.d}</span><span>${m.t}</span></div>`;
    list.appendChild(d);
  });
  setTimeout(()=>{
    const cur = list.querySelector(".cur");
    if(cur) cur.scrollIntoView({block:"center",behavior:"smooth"});
  },100);
}

function goBack() {
  const video = document.getElementById("player");
  const iframe = document.getElementById("iframePlayer");
  video.pause();
  if(hls){hls.destroy();hls=null;}
  video.src="";
  iframe.src="";
  iframe.style.display="none";
  video.style.display="block";
  document.getElementById("sp").style.display="none";
  document.getElementById("sp").classList.remove("active");
  document.getElementById("schp").style.display="";
  document.getElementById("schp").classList.add("active");
}

buildSchedule();
